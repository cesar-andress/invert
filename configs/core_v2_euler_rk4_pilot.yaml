run:
  name: core_v2_euler_rk4_pilot_001
  overwrite: false

family: F1
dimension: euler_vs_rk4

tasks:
  file: data/core_v2/tasks/euler_rk4_tasks.json
  include:
    - exponential_decay
    - logistic_growth
    - harmonic_oscillator

generation:
  models:
    - openai
    - anthropic
  repetitions: 3
  language: python
  pure_implementation: true
  models_config: configs/models.yaml

methods:
  - euler
  - rk4

stripping:
  levels:
    - raw
    - no_comments
    - renamed
    - no_imports
    - format_normalized
